version: "3.8"

services:
  api:
    image: credit-default-predictor:v1   # наш локальный образ (или raisas/credit-default-predictor:v1)
    container_name: credit-api
    ports:
      - "5000:5000"    # проброс порта для прямого доступа
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: credit-nginx
    ports:
      - "80:80"        # внешний порт 80 → nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro   # конфиг nginx
      - ./nginx/logs:/var/log/nginx   # сохраняем логи на хосте
    depends_on:
      - api